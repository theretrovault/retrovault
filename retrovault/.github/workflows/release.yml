name: Release and publish registries from prod tag

on:
  push:
    tags:
      - 'v*.*.*'

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: theretrovault/retrovault
  DOCKERHUB_IMAGE_NAME: retrovault/retrovault

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      RETROVAULT_ENV: prod
      RETROVAULT_DATA_DIR: ${{ github.workspace }}/data/prod
      RETROVAULT_DB_PATH: ${{ github.workspace }}/data/prod/retrovault.db
      RETROVAULT_CONFIG_PATH: ${{ github.workspace }}/data/prod/app.config.json
      RETROVAULT_SCRAPERS_PATH: ${{ github.workspace }}/data/prod/scrapers.json
      DATABASE_URL: file:${{ github.workspace }}/data/prod/retrovault.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup env data
        run: node scripts/setup-env-data.mjs

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

      - name: Smoke test build artifacts
        run: npm run smoke:release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
          labels: |
            org.opencontainers.image.title=RetroVault
            org.opencontainers.image.description=A self-hosted command center for retro game collectors.
            org.opencontainers.image.vendor=RetroVault
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
