name: CI

on:
  push:
    branches:
      - master
      - autopush
      - nightly
      - prod
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      RETROVAULT_ENV: prod
      RETROVAULT_DATA_DIR: ${{ github.workspace }}/data/prod
      RETROVAULT_DB_PATH: ${{ github.workspace }}/data/prod/retrovault.db
      RETROVAULT_CONFIG_PATH: ${{ github.workspace }}/data/prod/app.config.json
      RETROVAULT_SCRAPERS_PATH: ${{ github.workspace }}/data/prod/scrapers.json
      DATABASE_URL: file:${{ github.workspace }}/data/prod/retrovault.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup env data
        run: node scripts/setup-env-data.mjs

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build
