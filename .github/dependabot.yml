version: 2
updates:
  # RetroVault app dependencies
  - package-ecosystem: "npm"
    directory: "/retrovault"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
    # Group minor + patch updates together to reduce PR noise
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Always open separate PRs for major version bumps
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
